# github-review-loop configuration
#
# This file defines the reviewer-loop policy for THIS repository.
# Commit it so every collaborator and CI runs the same policy.
#
# Each reviewer entry:
#   type:        "user" | "github-copilot" | "github-app"
#   name:        login (required for "user" and "github-app")
#   goal:        exactly one of { approved: true } or { all-conversations-resolved: true }
#   max-rallies: safety limit (optional, default 5)
#   trigger:     for "github-app", a comment string posted to trigger the bot (optional)

reviewers:
  - type: github-copilot
    goal:
      all-conversations-resolved: true
    max-rallies: 5

